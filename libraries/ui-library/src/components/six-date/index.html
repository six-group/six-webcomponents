<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <script type="module" src="/build/ui-library.esm.js"></script>
    <script nomodule src="/build/ui-library.js"></script>
    <link rel="stylesheet" href="/build/ui-library.css" />
    <title>six-date</title>
  </head>
  <body>
    <div class="container">
      <p>Datepickers allow the user to manually enter a date or open a popup calendar to select a date.</p>
      <section>
        <six-date value="2025-04-05" min="2025-04-05" label="Date" clearable></six-date>
      </section>

      <div id="read-select-date-label">No Date selected yet!</div>
      <six-date id="read-select-date-picker"></six-date>

      <script type="module">
        const datepicker = document.getElementById('read-select-date-picker');
        const selectedDate = document.getElementById('read-select-date-label');

        datepicker.addEventListener('change', (event) => {
          selectedDate.innerHTML = `selected: ${event.target.value}`;
        });
      </script>
      <style>
        six-datepicker {
          max-width: 25rem;
        }
      </style>
    </div>
  </body>
</html>
